    "date": "2025-11-27",
    "title": "Thanksgiving",
    "topic": "Holidays",
    "body": "Nov. 27, 2025\n\nIf Thanksgiving were a movie, the version most people know is the G-rated trailer:\nPilgrims in shiny buckles, “helpful Indians” holding decorative corn, everyone gathering for a peaceful potluck that ends with turkey, pie, and a group hug.\n\nThe actual story is closer to a gritty, award-winning historical drama where everyone does their best to stay alive, politics are messy, motives are complicated, and nobody’s hair looks that perfect.\n\nLet’s begin.\n\n🌾 BEFORE THE PILGRIMS: THE LAND OF PLENTY (WITH A LOT FEWER PEOPLE)\nBefore the Mayflower showed up, New England was home to thriving Native nations — the Wampanoag, Nipmuc, Pequot, Massachusett, and others — who had their own harvest festivals, rituals, and complex diplomacy.\n\n\nThink of them as the original “farm-to-table” experts.\n\n​\n\nThen came European diseases in 1616–1619, wiping out up to 90% of the coastal population.\nImagine hosting a beautiful neighborhood — then suddenly your entire community disappears in a tragedy you don’t understand.\n\nBy the time the Pilgrims arrived, the land wasn’t “empty.” It had been devastated.\n\n⚓ ENTER THE PILGRIMS: STRUGGLING, STARVING, AND NOT EXACTLY HEROIC\n​\nThe Pilgrims didn’t arrive ready to build a shining beacon of democracy.\nThey arrived freezing, hungry, and very willing to steal from Indigenous storage pits and graves because… well, winter was winning.\n\nWilliam Bradford literally wrote about this grave-robbing himself. Bold choice.\n\nThey survived because the Wampanoag shared knowledge of farming, fishing, and the geography.\nWithout this help, Plymouth might’ve been a short-lived footnote.\n\n🥧 THE 1621 FEAST: NOT WHAT YOU THINK\nThe famous “first Thanksgiving”?\n\nNot a Thanksgiving.\nNot religious.\nNot invited.\nNot peaceful cooperation so much as a diplomatic emergency meeting.\n\nEdward Winslow wrote the only detailed account — and here’s the short version:\n\nThe Pilgrims were doing a harvest celebration.\n\nThey fired guns as part of the festivities (as one does, apparently).\n\nA group of 90 armed Wampanoag men rushed in, thinking maybe the newcomers were under attack.\n\nThey stayed for three days.\n\nThey brought deer.\n\nThere was no pumpkin pie, no cranberry sauce, and probably no turkey. (Sorry, Hallmark.)\n\nThis was less Friendsgiving and more “corporate merger negotiation with venison.”\n\n🔥 PEACE… AND THEN A WHOLE LOT OF NOPE\nWhatever good feelings existed did not last long.\n\nAs more Europeans arrived, land got taken, livestock destroyed, Indigenous fields were destroyed, treaties got twisted, and tension turned into all-out war.\n\nKing Philip’s War (1675–1676) was so deadly that, per capita, it makes modern wars look tame. Entire villages burned. Families enslaved. Wampanoag society was nearly destroyed.\n\nThis is the part your school textbook skipped to “protect the children,” which is ironic, because children reenact the feast every year with construction paper hats.\n\n​\n\n🤝 HOW THANKSGIVING BECAME A HOLIDAY (HINT: POLITICS)\nThe Pilgrims didn’t start the national holiday. The idea didn’t catch on for more than a century. Nobody said, “See you next year for another feast!”\n\nInstead:\n\nPuritans held occasional “Thanksgiving Days” that were about fasting, praying, and feeling guilty — the least festive holiday imaginable.\n\nIn the 1800s, magazine editor Sarah Josepha Hale (the Mary Poppins of moral persuasion) lobbied nonstop for a unified national Thanksgiving.\n\nAbraham Lincoln made it official in 1863 — during the Civil War — because nothing says “unity” like roasted turkey while the country is literally fighting itself.\n\nIn 1939, FDR even moved the date to boost Christmas shopping. Yup — we literally have “Franksgiving.”\n\nThe holiday is more a political invention than a Pilgrim tradition.\n\n​\n\n🧝‍♂️ TEXTBOOK MYTHOLOGY: AMERICA’S FAVORITE FAIRY TALE\nOver time, textbooks airbrushed away:\n\nepidemics\n\ngrave-robbing\n\nThe Pequot massacre (celebrated with a colonial “Thanksgiving”)\n\nKing Philip’s War\n\nIndigenous enslavement\n\nLand theft\n\nThe fact that the Wampanoag had strategic reasons for not kicking out the Pilgrims immediately\n\nInstead, the story became:\n\n“Once upon a time, the Pilgrims and Indians shared a meal, and America lived happily ever after.”\n\nIt’s basically historical fanfiction.\n\n🪶 INDIGENOUS PERSPECTIVES: THE PART WE SHOULD’VE HEARD FIRST\nToday, Wampanoag descendants and many Native nations describe Thanksgiving as:\n\nA reminder of genocide,\n\nA symbol of broken treaties,\n\nA myth used to justify colonial expansion,\n\nA story that portrays them as side characters in their own land.\n\nSince 1970, Indigenous activists have held a National Day of Mourning at Plymouth Rock, pointing out that the feel-good version of Thanksgiving erases centuries of suffering.\n\nAs Wampanoag educators like Linda Coombs put it:\n\n“We helped them survive, but they did not help us survive in return.”\n\nMic drop.\n\n🦅 SO WHAT IS THANKSGIVING TODAY?\nThanksgiving now is a patchwork quilt:\n\n🟡 Traditional family dinners\n🟡 Immigrant reinterpretations (tamales, curry, pancit, jollof rice at the table)\n🟡 Indigenous mourning ceremonies\n🟡 Volunteerism and charity\n🟡 Travel chaos\n🟡 Football\n🟡 Black Friday (aka The Hunger Games for discounted appliances)\n\nIt’s a holiday that America continuously rewrites — sometimes beautifully, sometimes problematically, always revealing something about our collective identity.\n\nTHE TAKEAWAY: A HOLIDAY WITH TWO STORIES\nStory 1: The Myth\nPilgrims + Native Americans = happy feast = America born in friendship.\n\nStory 2: The Reality\n\nEpidemic, desperation, diplomacy\n\nCultural misunderstanding\n\nViolence, war, and colonization\n\nMyth-making to soothe national tensions\n\nA holiday reinvented for politics, unity, and sales\n\nBoth stories coexist today, one comforting, one challenging.\n\n​\n\nThe important thing isn’t to choose between them.\nIt’s to recognize the whole picture and decide what meaning we want this holiday to carry moving forward.\n\nIf we can hold gratitude and honesty in the same hand, maybe we’ll finally have something worth celebrating.",

// 2. STATE
// ======================================================
let filtered = comments.slice();
let showingDetail = null;

// ======================================================
// 3. FILTERING
// ======================================================
function filterComments() {
  const dateVal   = document.getElementById("dateSearch").value;
  const topicVal  = document.getElementById("topicSearch").value.trim().toLowerCase();
  const seriesVal = document.getElementById("seriesSearch").value.trim().toLowerCase();

  filtered = comments.filter(c => {
    if (!c || !c.title) return false;

    const dateMatch = !dateVal || c.date === dateVal;

    const topicMatch = !topicVal || (
      (c.topic  && c.topic.toLowerCase().includes(topicVal)) ||
      (c.title  && c.title.toLowerCase().includes(topicVal)) ||
      (c.body   && c.body.toLowerCase().includes(topicVal))
    );

    const seriesMatch = !seriesVal || (
      c.series && c.series.toLowerCase().includes(seriesVal)
    );

    return dateMatch && topicMatch && seriesMatch;
  });

  showingDetail = null;
  renderList();
}

// ======================================================
// 4. LIST RENDER
// ======================================================
function renderList() {
  const list   = document.getElementById("commentList");
  const detail = document.getElementById("commentDetail");
  if (!list || !detail) return;

  detail.innerHTML = "";
  list.innerHTML = "";

  if (!filtered.length) {
    list.innerHTML = `<li><span class="comment-title">No entries found.</span></li>`;
    return;
  }

  filtered.forEach(c => {
    const li = document.createElement("li");
    li.onclick = () => showDetail(c);

    const snippet = c.body
      ? c.body.slice(0, 120) + (c.body.length > 120 ? "…" : "")
      : "";

    const topic  = c.topic  || "";
    const series = c.series || "";
    const date   = c.date   || "";

    const metaText = [topic, series ? `Series: ${series}` : "", date]
      .filter(Boolean).join(" • ");

    li.innerHTML = `
      <div class="comment-title">${escapeHtml(c.title || "")}</div>
      <div class="comment-meta">${escapeHtml(metaText)}</div>
      <div class="comment-body">${escapeHtml(snippet)}</div>
    `;
    list.appendChild(li);
  });
}

// ======================================================
// 5. DETAIL VIEW → POPUP MODAL
// ======================================================
function showDetail(c) {
  showingDetail = c;

  const backdrop = document.getElementById("modalBackdrop");
  const modal    = document.getElementById("articleModal");
  const titleEl  = document.getElementById("modalTitle");
  const metaEl   = document.getElementById("modalMeta");
  const bodyEl   = document.getElementById("modalBody");
  const linkRow  = document.getElementById("modalLinkRow");

  const topic  = c.topic  || "";
  const series = c.series || "";
  const date   = c.date   || "";

  const metaText = [topic, series ? `Series: ${series}` : "", date]
    .filter(Boolean).join(" • ");

  titleEl.textContent = c.title || "";
  metaEl.textContent  = metaText;
  bodyEl.textContent  = c.body || "";
  linkRow.innerHTML   = "";

  if (c.link) {
    const btn = document.createElement("button");
    btn.className = "open-link-btn";
    btn.textContent = "Open Full Article";
    btn.addEventListener("click", function(e) {
      e.stopPropagation();
      window.open(c.link, "_blank");
    });
    linkRow.appendChild(btn);
  }

  backdrop.classList.remove("hidden");
  modal.classList.remove("hidden");

  // Center the modal initially
  const rect = modal.getBoundingClientRect();
  const left = Math.max(14, (window.innerWidth - rect.width) / 2);
  const top  = Math.max(24, (window.innerHeight - rect.height) / 4);
  modal.style.left = left + "px";
  modal.style.top  = top  + "px";
}

function closeModal() {
  document.getElementById("modalBackdrop").classList.add("hidden");
  document.getElementById("articleModal").classList.add("hidden");
}

// ======================================================
// 6. DRAGGABLE MODAL
// ======================================================
let isDragging = false;
let dragOffsetX = 0;
let dragOffsetY = 0;

function initDrag() {
  const modal  = document.getElementById("articleModal");
  const header = document.getElementById("modalHeader");
  if (!modal || !header) return;

  header.addEventListener("mousedown", function(e) {
    isDragging = true;
    const rect = modal.getBoundingClientRect();
    dragOffsetX = e.clientX - rect.left;
    dragOffsetY = e.clientY - rect.top;
    e.preventDefault();
  });

  window.addEventListener("mousemove", function(e) {
    if (!isDragging) return;
    const modal = document.getElementById("articleModal");
    if (!modal) return;

    let left = e.clientX - dragOffsetX;
    let top  = e.clientY - dragOffsetY;

    const maxLeft = window.innerWidth  - modal.offsetWidth;
    const maxTop  = window.innerHeight - modal.offsetHeight;

    if (left < 7) left = 7;
    if (top  < 7) top  = 7;
    if (left > maxLeft - 7) left = maxLeft - 7;
    if (top  > maxTop  - 7) top  = maxTop  - 7;

    modal.style.left = left + "px";
    modal.style.top  = top  + "px";
  });

  window.addEventListener("mouseup", function() {
    isDragging = false;
  });
}

// ======================================================
// 7. UTILS
// ======================================================
function escapeHtml(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ======================================================
// 8. INIT
// ======================================================
filterComments();
initDrag();
</script>
