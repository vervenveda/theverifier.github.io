    "date": "2025-11-30",
    "title": "U.S. politics on Israel",
    "topic": "Corrupt and Immoral",
    "body": "When it comes to Israel, the U.S. political scene looks a bit like a chaotic dinner party. At one end of the table, you have the staunch supporters: Rubio, Wicker, and Grassley, raising their glasses, fully committed to backing Israel no matter what. They’ve got the wine, the speeches, and the military aid all lined up.\n\nAcross the table sit the neutral or “cautious sip” folks: Ossoff, Booker, and Andy Kim, balancing their drinks while eyeing the desserts (humanitarian concerns). They cheer for Israel in principle but occasionally mutter, “Maybe let’s hold off on the next round of arms for now.”\n\nAnd then there’s the critical crew: Sanders, Merkley, Duckworth, holding up the “Stop!” sign with a fork in one hand and a plate of Gaza humanitarian aid in the other. They’re not anti-Israel, per se, but they insist that human rights and civilian safety come before sending more weapons to the table.\n\nMeanwhile, a few politicians are hovering on the edges, unsure whether to grab a glass, a plate, or just sneak out for dessert later; they’re the “undecided/evolving” group, waiting for public opinion (and maybe a social media poll or two) to guide their next move.\n\nThe takeaway: U.S. politics on Israel isn’t black or white; it’s more like a buffet where everyone piles their plate differently. Some go heavy on loyalty, some balance cautiously, and some prioritise ethics, and the menu keeps changing with every global headline.\n\n∆ Verifier News, Verve n Veda",
    "link": "https://docs.google.com/document/d/e/2PACX-1vRh0YSzY56jzA_-i5Az2-9K3CTiDOuYaglV3m7H0LLONIFn8t5UNLuUTJbsoIis515kEoDR_hnABJnf/pub",
    "series": "Corruption"
  },
  {
    "date": "2025-11-29",
    "title": "Benjamin Netanyahu’s US Support",
    "topic": "Corrupt and Immoral",
    "body": "Benjamin Netanyahu’s ability to govern and execute military operations; even under allegations of serious war crimes, has been heavily influenced by decades of U.S. support. This support comes in multiple forms: military aid, diplomatic backing, and political cover.\n\nFrom the earliest days of Israel, U.S. presidents have cultivated a close alliance, providing weapons, defense aid, and strategic partnership. This relationship has grown more extensive over time, granting Israeli leaders, including Netanyahu, a level of security and international leverage few countries enjoy.\n\nUnder presidents like Barack Obama, Donald Trump, and Joe Biden, U.S. support has taken specific forms that effectively enable Netanyahu’s actions:\n\nMilitary aid: Long-term agreements guarantee Israel billions in funding annually, ensuring a “qualitative military edge” over regional adversaries. This reduces the deterrent effect of international law or humanitarian norms.\n\nDiplomatic protection: The U.S. frequently shields Israel from global condemnation, votes in international bodies to block sanctions, and provides political validation for controversial policies.\n\nPolitical cover: Support from both Democratic and Republican administrations has created an environment in which aggressive policies can be pursued with limited external consequences.\n\nIn practice, this backing provides Netanyahu with strategic leeway to act decisively, even in ways that attract international scrutiny, while minimizing political, military, and reputational risk. It illustrates a broader point: accountability for alleged crimes cannot be viewed solely through the lens of direct action. Powerful external allies, like the U.S., play a critical role in enabling the conditions under which such actions occur.\n\nIn short, Netanyahu’s leadership is inseparable from the support of the U.S.: his military campaigns, policy decisions, and capacity to operate with near-impunity are significantly reinforced by decades of American backing. Understanding this dynamic is essential for assessing both responsibility and the broader challenges of enforcing international law.\n\n∆ Verifier News, Verve n Veda",
    "series": "governance, power, and accountability."
  },
  {
    "date": "2025-11-28",
    "title": "America’s Pollution Crisis Needs Courage",
    "topic": "Pollution",
    "body": "America’s Pollution Crisis Needs Courage, Not Caution\n\nAmerica is standing in the middle of a pollution storm, and our leaders are still trying to decide whether they should open an umbrella or pretend it is not raining.\n\nPlastic fills our rivers. Chemical pollutants seep into our drinking water. Microplastics drift through our air and lodge themselves inside our bodies. Yet we treat this crisis as an optional homework assignment rather than the national emergency it is. The clock is ticking, and the United States needs to stop admiring the problem and start confronting it.\n\nThe truth is simple. Pollution is not an act of nature. It is an act of policy.\n\nEvery plastic factory that expands production. Every truckload of waste that gets exported instead of recycled. Every chemical loophole that lets toxic pollutants slip through the cracks. These are political choices. And choices can be changed.\n\nThe EPA has begun to move forward with stronger rules for PFAS and a national strategy for plastic pollution. This is a start, but it is not enough. You cannot mop the floor while the faucet is still running. We need production limits, not just cleanup plans. We need toxic chemicals banned, not politely discouraged. We need companies held responsible for the waste they create, not rewarded for finding new places to dump it.\n\nAmerica has always prided itself on innovation and leadership. Yet on pollution, we are trailing behind countries that treat environmental protection as a duty rather than a debate stage talking point. This is not a partisan issue. Polluted water does not check voter registration. Plastic dust does not ask whether your state is red or blue. Pollution harms everyone.\n\nThis is the moment to demand courage from our leaders. Congress must tighten chemical laws. The EPA must fully enforce the protections it has the authority to uphold. States must stop waiting for federal direction and adopt strong, consistent policies of their own. And the public must refuse to accept a future where contamination is normal and inaction is the rule.\n\nWe have the science. We have the technology. What we need now is political will.\n\nPollution is not mysterious. It is predictable, measurable, and solvable. Every community that speaks out makes it harder for officials to look away. Every law that restricts harmful chemicals saves lives. Every investment in better waste systems prevents a new environmental burden from landing at someone else’s feet.\n\nThe world is waiting for the United States to lead. The only question is whether we will rise to that role or continue to watch the pollution crisis grow from the comfort of our sidelines.\n\nThis is our call to action. Demand better. Vote with intention. Support leaders who treat environmental protection as responsibility, not rhetoric. Hold companies accountable. And most of all, refuse to accept pollution as the price of modern life.\n\nAmerica can clean up this mess. But only if we decide to.\n\n∆ Verifier News, Verve n Veda",
    "series": "Chemical pollutants, Plastics"
  },
  {
    "date": "2025-11-27",
    "title": "U.S. Aid to Israel Strains and Destabilizes",
    "topic": "Corrupt and Immoral",
    "body": "How U.S. Aid to Israel Strains and Destabilizes American Politics\n\nU.S. support for Israel has become one of the most polarizing foreign-policy issues in American life. When ceasefire violations, civilian casualties, or humanitarian crises occur, the political effects ripple back into the U.S. in several damaging ways:\n\n1. Deepening political polarization\n\nThe issue has become a fault line within both parties:\n\nWithin the Democratic Party\n\nYounger voters, progressives, and communities of color overwhelmingly oppose unconditional military aid.\n\nOlder, more centrist Democrats strongly support it.\n\nThis has created one of the biggest generational divides in modern Democratic politics.\n\nThe White House often faces pressure from both sides, splintering party unity.\n\nWithin the Republican Party\n\nSupport for Israel is nearly universal in the GOP, but divisions exist over:\n\nneoconservative interventionism\n\nAmerica First isolationism\n\nThis tension leads to intraparty fights over foreign aid bills and defense spending.\n\nResult: Israel policy has become a destabilizing ideological wedge inside both parties.\n\n2. Erosion of public trust in the government\n\nMany Americans see a gap between what they want and what Washington does:\n\nPolls show a majority of Americans support conditioning military aid on compliance with international law.\n\nYet Congress continues to approve huge aid packages.\n\nThis disconnect fuels:\n\nCynicism about whether leaders listen to the public\n\nGrowing distrust in institutions\n\nDeclining voter faith in elections (“If our votes don’t shift policy, why bother?”)\n\nThis dynamic mirrors the loss of trust seen during the Iraq and Afghanistan wars.\n\n3. Increasing anger among key voter groups\n\nU.S. policy toward Israel has triggered the largest political backlash from Muslim Americans in U.S. history, along with major frustration from Arab Americans, young voters, and college-educated progressives.\n\nSymptoms:\n\nMass voter “uncommitted” protest votes in Democratic primaries\n\nActivism on campuses and in cities\n\nDisengagement or apathy toward elections\n\nFor a country with tightly contested elections, even small shifts among these groups can determine outcomes.\n\n4. Weaponization of the issue in partisan politics\n\nThe Israel–Gaza conflict has become a political tool:\n\nPoliticians use it to attack opponents as “extremist,” “antisemitic,” or “complicit in genocide,” depending on the side.\n\nThis deepens hostility, misinformation, and political tribalism.\n\nForeign policy becomes a culture-war proxy, making rational debate harder.\n\n5. Impacts on U.S. global credibility\n\nWhen U.S. weapons are used in actions widely condemned by the international community, it undermines America’s claim to support:\n\nhuman rights\n\ndemocratic norms\n\nrule of law\n\nThis global credibility gap boomerangs back into domestic politics because:\n\nCritics accuse the government of hypocrisy\n\nAllies question U.S. commitments\n\nOpponents argue foreign policy is driven by lobbying, not national interest\n\nThis fuels domestic debates about corruption, influence, and the purpose of U.S. power.\n\n6. Strains in civil society and social cohesion\n\nProtests, counter-protests, campus occupations, accusations of censorship, and rhetorical escalation have stressed:\n\nuniversities\n\nworkplaces\n\nreligious communities\n\nlocal governments\n\nThese tensions increase pressure on political leaders and polarize voters further.\n\nIn short: foreign policy has bled into every cultural, educational, and civic space, fragmenting the public.\n\n\nAid to Israel has repeatedly caused:\n\nLegislative paralysis and dysfunction\n\nStandoffs in Congress\n\nBlocked spending bills\n\nParty infighting\n\nBrinkmanship over foreign aid packages\n\nThis contributes to the perception that Washington is ungovernable.\n\nU.S. military aid to Israel doesn’t just influence Middle-East geopolitics it has become a central destabilizing force in American politics itself.\n\nIt fuels:\n\npolarization\n\ninternal party splits\n\ndeclining trust in institutions\n\nvoter disengagement\n\ncivil-society tensions\n\nlegislative gridlock\n\nand challenges to U.S. global credibility\n\nWhether one supports or opposes the aid, the political costs inside the U.S. are now undeniable and growing.\n\n∆ Verifier News, Verve n Veda",
    "series": "Corruption Genocide Human Rights VIolations"
  },
  {
    "date": "2025-11-26",

// 2. STATE

let filtered = comments.slice();
let showingDetail = null;

// ======================================================
// 3. FILTERING
// ======================================================
function filterComments() {
  const dateVal   = document.getElementById("dateSearch").value;
  const topicVal  = document.getElementById("topicSearch").value.trim().toLowerCase();
  const seriesVal = document.getElementById("seriesSearch").value.trim().toLowerCase();

  filtered = comments.filter(c => {
    if (!c || !c.title) return false;

    const dateMatch = !dateVal || c.date === dateVal;

    const topicMatch = !topicVal || (
      (c.topic  && c.topic.toLowerCase().includes(topicVal)) ||
      (c.title  && c.title.toLowerCase().includes(topicVal)) ||
      (c.body   && c.body.toLowerCase().includes(topicVal))
    );

    const seriesMatch = !seriesVal || (
      c.series && c.series.toLowerCase().includes(seriesVal)
    );

    return dateMatch && topicMatch && seriesMatch;
  });

  showingDetail = null;
  renderList();
}

// ======================================================
// 4. LIST RENDER
// ======================================================
function renderList() {
  const list   = document.getElementById("commentList");
  const detail = document.getElementById("commentDetail");
  if (!list || !detail) return;

  detail.innerHTML = "";
  list.innerHTML = "";

  if (!filtered.length) {
    list.innerHTML = `<li><span class="comment-title">No entries found.</span></li>`;
    return;
  }

  filtered.forEach(c => {
    const li = document.createElement("li");
    li.onclick = () => showDetail(c);

    const snippet = c.body
      ? c.body.slice(0, 120) + (c.body.length > 120 ? "…" : "")
      : "";

    const topic  = c.topic  || "";
    const series = c.series || "";
    const date   = c.date   || "";

    const metaText = [topic, series ? `Series: ${series}` : "", date]
      .filter(Boolean).join(" • ");

    li.innerHTML = `
      <div class="comment-title">${escapeHtml(c.title || "")}</div>
      <div class="comment-meta">${escapeHtml(metaText)}</div>
      <div class="comment-body">${escapeHtml(snippet)}</div>
    `;
    list.appendChild(li);
  });
}

// ======================================================
// 5. DETAIL VIEW → POPUP MODAL
// ======================================================
function showDetail(c) {
  showingDetail = c;

  const backdrop = document.getElementById("modalBackdrop");
  const modal    = document.getElementById("articleModal");
  const titleEl  = document.getElementById("modalTitle");
  const metaEl   = document.getElementById("modalMeta");
  const bodyEl   = document.getElementById("modalBody");
  const linkRow  = document.getElementById("modalLinkRow");

  const topic  = c.topic  || "";
  const series = c.series || "";
  const date   = c.date   || "";

  const metaText = [topic, series ? `Series: ${series}` : "", date]
    .filter(Boolean).join(" • ");

  titleEl.textContent = c.title || "";
  metaEl.textContent  = metaText;
  bodyEl.textContent  = c.body || "";
  linkRow.innerHTML   = "";

  if (c.link) {
    const btn = document.createElement("button");
    btn.className = "open-link-btn";
    btn.textContent = "Open Full Article";
    btn.addEventListener("click", function(e) {
      e.stopPropagation();
      window.open(c.link, "_blank");
    });
    linkRow.appendChild(btn);
  }

  backdrop.classList.remove("hidden");
  modal.classList.remove("hidden");

  // Center the modal initially
  const rect = modal.getBoundingClientRect();
  const left = Math.max(14, (window.innerWidth - rect.width) / 2);
  const top  = Math.max(24, (window.innerHeight - rect.height) / 4);
  modal.style.left = left + "px";
  modal.style.top  = top  + "px";
}

function closeModal() {
  document.getElementById("modalBackdrop").classList.add("hidden");
  document.getElementById("articleModal").classList.add("hidden");
}

// ======================================================
// 6. DRAGGABLE MODAL
// ======================================================
let isDragging = false;
let dragOffsetX = 0;
let dragOffsetY = 0;

function initDrag() {
  const modal  = document.getElementById("articleModal");
  const header = document.getElementById("modalHeader");
  if (!modal || !header) return;

  header.addEventListener("mousedown", function(e) {
    isDragging = true;
    const rect = modal.getBoundingClientRect();
    dragOffsetX = e.clientX - rect.left;
    dragOffsetY = e.clientY - rect.top;
    e.preventDefault();
  });

  window.addEventListener("mousemove", function(e) {
    if (!isDragging) return;
    const modal = document.getElementById("articleModal");
    if (!modal) return;

    let left = e.clientX - dragOffsetX;
    let top  = e.clientY - dragOffsetY;

    const maxLeft = window.innerWidth  - modal.offsetWidth;
    const maxTop  = window.innerHeight - modal.offsetHeight;

    if (left < 7) left = 7;
    if (top  < 7) top  = 7;
    if (left > maxLeft - 7) left = maxLeft - 7;
    if (top  > maxTop  - 7) top  = maxTop  - 7;

    modal.style.left = left + "px";
    modal.style.top  = top  + "px";
  });

  window.addEventListener("mouseup", function() {
    isDragging = false;
  });
}

// ======================================================
// 7. UTILS
// ======================================================
function escapeHtml(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ======================================================
// 8. INIT
// ======================================================
filterComments();
initDrag();
</script>
