<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Violence, Religion, and Data</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      background: #f6f6f6;
      color: #222;
      line-height: 1.6;
    }

    header {
      background: #1e293b;
      color: #fff;
      padding: 1.5rem;
      text-align: center;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      background: #e5e7eb;
      padding: 0.75rem;
    }

    nav button {
      border: none;
      padding: 0.5rem 0.75rem;
      background: #fff;
      cursor: pointer;
      border-radius: 4px;
    }

    nav button.active {
      background: #1e293b;
      color: white;
    }

    main {
      max-width: 900px;
      margin: auto;
      padding: 1.5rem;
      background: white;
    }

    .module {
      display: none;
    }

    .module.active {
      display: block;
    }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
      color: #555;
    }
  </style>
</head>

<body>
  <header>
    <h1>Violence, Religion, and Data</h1>
    <p>An educational mini-course on how violence is measured and misattributed</p>
  </header>

  <nav id="nav"></nav>

  <main id="content"></main>

  <footer>
    This course uses publicly documented research methods.  
    No tracking. No ads. No external dependencies.
  </footer>

  <script>
    const modules = [
      {
        title: "1. How Violence Is Measured",
        content: `
          <h2>How Violence Is Measured</h2>
          <p>Most global datasets do not measure “religious violence.” They measure
          <strong>terrorism</strong>, <strong>armed conflict</strong>, or <strong>criminal violence</strong>.</p>

          <ul>
            <li>Terrorism: violence by non-state actors to influence politics or society</li>
            <li>War: sustained armed conflict between organized forces</li>
            <li>State violence: actions by governments or armies</li>
          </ul>
        `
      },
      {
        title: "2. Religion vs Ideology",
        content: `
          <h2>Religion vs Extremist Ideology</h2>
          <p>Religions are belief systems. Extremist ideologies are political movements.</p>
          <p>Violent groups may use religious language, but datasets track
          <strong>actors and motivations</strong>, not faiths.</p>
        `
      },
      {
        title: "3. Islamist Extremism",
        content: `
          <h2>Islamist Extremist Violence</h2>
          <p>Groups such as ISIS or Boko Haram are classified as
          <strong>Islamist extremist organizations</strong>.</p>
          <p>Most victims of these groups are Muslims living in conflict regions.</p>
        `
      },
      {
        title: "4. Christian-Identified Extremism",
        content: `
          <h2>Christian-Identified Extremism</h2>
          <p>Violence associated with Christian identity is usually categorized as
          <strong>far-right or nationalist extremism</strong>, not religious terrorism.</p>
        `
      },
      {
        title: "5. Zionist Extremism",
        content: `
          <h2>Zionist-Linked Extremism</h2>
          <p>Judaism, Zionism, and Israeli state policy are distinct.</p>
          <p>Extremist settler violence is documented but rare and context-specific.</p>
        `
      },
      {
        title: "6. Comparing Data Honestly",
        content: `
          <h2>Comparing Data Without Bias</h2>
          <ul>
            <li>Compare like with like</li>
            <li>Check definitions</li>
            <li>Watch for selective timeframes</li>
          </ul>
        `
      },
      {
        title: "7. Media Literacy",
        content: `
          <h2>Media Literacy Toolkit</h2>
          <p>Before sharing claims, ask:</p>
          <ul>
            <li>What is being measured?</li>
            <li>Who collected the data?</li>
            <li>What is excluded?</li>
          </ul>
        `
      }
    ];

    const nav = document.getElementById("nav");
    const content = document.getElementById("content");

    function loadModule(index) {
      document.querySelectorAll("nav button").forEach(btn =>
        btn.classList.remove("active")
      );
      nav.children[index].classList.add("active");
      content.innerHTML = modules[index].content;
    }

    modules.forEach((mod, i) => {
      const btn = document.createElement("button");
      btn.textContent = mod.title;
      btn.onclick = () => loadModule(i);
      nav.appendChild(btn);
    });

    loadModule(0);
  </script>
</body>
</html>
