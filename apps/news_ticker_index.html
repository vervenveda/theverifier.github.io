<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The Verifier — Dual Source Ticker</title>
<style>
  :root{
    --bg-midnight:#111a34;
    --ink-soft:#c7d2e5;
    --accent:#ffd400;
    --accent-soft:rgba(255,212,0,0.12);
    --border-soft:rgba(255,255,255,0.05);
    --radius:11px;
    --font-main:'Inter',system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --marquee-duration:111s; /* 👈 adjust speed here */
  }

  html,body{
    margin:0;
    padding:0;
    background:transparent;
    font-family:var(--font-main);
    overflow:hidden; /* prevent bar from causing page scroll */
  }

  .verifier-bar{
    background:linear-gradient(180deg,#050816,#020414);
    border-radius:var(--radius);
    border:1px solid var(--border-soft);
    box-shadow:0 14px 33px rgba(0,0,0,0.65);
    color:#f9fafb;
    padding:9px 14px 11px;
    display:flex;
    align-items:flex-start;
    gap:14px;
    max-width:1300px;
    width:100%;
    box-sizing:border-box;
    margin:0 auto;
  }

  /* Brand block */
  .vb-brand{
    display:flex;
    align-items:center;
    gap:9px;
    padding-right:11px;
    border-right:1px solid rgba(148,163,184,0.35);
    flex-shrink:0;
  }
  .vb-logo{
    width:33px;
    height:33px;
    border-radius:11px;
    background:radial-gradient(circle at 30% 0%,#fffbe6,#e8b93a);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Cinzel',serif;
    font-weight:700;
    font-size:18px;
    color:#231300;
    box-shadow:0 7px 21px rgba(0,0,0,0.6);
  }
  .vb-text-main{
    font-size:15px;
    letter-spacing:0.18em;
    text-transform:uppercase;
  }
  .vb-text-sub{
    font-size:11px;
    color:rgba(226,232,240,0.78);
    letter-spacing:0.12em;
    text-transform:uppercase;
  }

  /* Ticker column */
  .vb-tickers{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:6px;
    padding:0 6px;
    min-width:0; /* important to avoid overflow */
  }

  .ticker-label{
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:rgba(148,163,184,0.95);
    display:flex;
    align-items:center;
    gap:7px;
  }
  .ticker-dot{
    width:5px;
    height:5px;
    border-radius:999px;
    background:var(--accent);
    box-shadow:0 0 10px rgba(255,212,0,0.7);
  }

  .marqueeWrap{
    overflow:hidden;
    border-radius:var(--radius);
    background:rgba(15,23,42,0.92);
    border:1px solid rgba(51,65,85,0.9);
    padding:6px 0;
  }

  /* Endless stream: track is [items][items], we scroll from 0 to -50% */
  .marquee{
    display:inline-block;
    white-space:nowrap;
    animation: vb-marquee var(--marquee-duration) linear infinite;
  }

  .ticker-link{
    color:var(--ink-soft);
    text-decoration:none;
    font-size:13px;
    padding:0 11px;
    display:inline-flex;
    align-items:center;
    gap:4px;
  }
  .ticker-link span.label{
    font-weight:600;
    color:#e5e7eb;
  }
  .ticker-link span.meta{
    font-size:11px;
    color:rgba(148,163,184,0.95);
  }
  .ticker-sep{
    color:rgba(100,116,139,0.75);
  }

  .ticker-link:hover{
    background:var(--accent-soft);
    color:#f9fafb;
  }

  /* Right clock */
  .vb-right{
    min-width:140px;
    text-align:right;
    font-size:11px;
    color:rgba(148,163,184,0.95);
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:3px;
    flex-shrink:0;
  }
  .vb-clock{
    font-size:13px;
    color:#e5e7eb;
  }

  @keyframes vb-marquee{
    0%   { transform:translateX(0); }
    100% { transform:translateX(-50%); } /* shift by one full sequence (out of two) */
  }

  @media (max-width:720px){
    .verifier-bar{
      flex-direction:column;
      align-items:stretch;
    }
    .vb-brand{
      border-right:none;
      border-bottom:1px solid rgba(148,163,184,0.35);
      padding-bottom:7px;
      margin-bottom:7px;
    }
    .vb-right{
      text-align:left;
      align-items:flex-start;
    }
  }
</style>
</head>
<body>

<div class="verifier-bar">
  <!-- Brand -->
  <div class="vb-brand">
    <div class="vb-logo">V</div>
    <div>
      <div class="vb-text-main">The Verifier</div>
      <div class="vb-text-sub">Global Source Compass</div>
    </div>
  </div>

  <!-- Two stackable tickers -->
  <div class="vb-tickers">
    <div class="ticker-label">
      <span class="ticker-dot"></span>
      Global · Wire · Public Service
    </div>
    <div class="marqueeWrap">
      <div id="tickerGlobal" class="marquee"></div>
    </div>

    <div class="ticker-label">
      <span class="ticker-dot"></span>
      Regional · Investigative · Specialized
    </div>
    <div class="marqueeWrap">
      <div id="tickerRegional" class="marquee"></div>
    </div>
  </div>

  <!-- Right side clock -->
  <div class="vb-right">
    <div>Live source map</div>
    <div id="vbClock" class="vb-clock">--:--:--</div>
  </div>
</div>

<script>
/* ====== OUTLETS (your list) ====== */
const OUTLETS = [
  { id:'ap', name:'Associated Press (AP)', region:'North America', country:'USA', language:'English', topic:'General / Breaking News', access:'Free, ad-supported', url:'https://apnews.com' },
  { id:'propublica', name:'ProPublica', region:'North America', country:'USA', language:'English', topic:'Investigative Journalism', access:'Fully free, non-profit', url:'https://www.propublica.org' },
  { id:'vox', name:'Vox', region:'North America', country:'USA', language:'English', topic:'Politics, Culture, Science', access:'Free access, ad-supported', url:'https://www.vox.com' },
  { id:'cbc', name:'CBC News', region:'North America', country:'Canada', language:'English / French', topic:'General, Canadian news', access:'Free access; some premium content', url:'https://www.cbc.ca/news' },
  { id:'globalnews', name:'Global News', region:'North America', country:'Canada', language:'English', topic:'General, Canadian news', access:'Free access, ad-supported', url:'https://globalnews.ca' },
  { id:'bbc', name:'BBC News', region:'Europe', country:'UK', language:'English', topic:'General, International', access:'Free, license-funded (UK)', url:'https://www.bbc.com/news' },
  { id:'guardian', name:'The Guardian', region:'Europe', country:'UK', language:'English', topic:'Investigative, International', access:'Free, optional donations', url:'https://www.theguardian.com' },
  { id:'dw', name:'Deutsche Welle (DW)', region:'Europe', country:'Germany', language:'English / German', topic:'International', access:'Free', url:'https://www.dw.com' },
  { id:'france24', name:'France 24', region:'Europe', country:'France', language:'English / French / Arabic', topic:'International', access:'Free', url:'https://www.france24.com' },
  { id:'politicoeu', name:'Politico EU', region:'Europe', country:'EU', language:'English', topic:'EU Politics', access:'Free; premium optional', url:'https://www.politico.eu' },
  { id:'hindu', name:'The Hindu', region:'Asia', country:'India', language:'English', topic:'General, Politics', access:'Some free; registration', url:'https://www.thehindu.com' },
  { id:'toi', name:'Times of India', region:'Asia', country:'India', language:'English / Hindi', topic:'General', access:'Free, ad-supported', url:'https://timesofindia.indiatimes.com' },
  { id:'scmp', name:'South China Morning Post', region:'Asia', country:'Hong Kong', language:'English', topic:'Asia News, Business', access:'Some free; subscription', url:'https://www.scmp.com' },
  { id:'japantimes', name:'Japan Times', region:'Asia', country:'Japan', language:'English', topic:'Japan News, Culture', access:'Some free; subscription', url:'https://www.japantimes.co.jp' },
  { id:'fmm', name:'Free Malaysia Today', region:'Asia', country:'Malaysia', language:'English', topic:'General', access:'Free', url:'https://www.freemalaysiatoday.com' },
  { id:'allafrica', name:'AllAfrica', region:'Africa', country:'Pan-Africa', language:'English', topic:'Africa-wide News', access:'Free', url:'https://allafrica.com' },
  { id:'dailynation', name:'Daily Nation', region:'Africa', country:'Kenya', language:'English', topic:'General', access:'Free', url:'https://nation.africa' },
  { id:'mailguardian', name:'Mail & Guardian', region:'Africa', country:'South Africa', language:'English', topic:'Investigative', access:'Some free', url:'https://mg.co.za' },
  { id:'sowetan', name:'Sowetan Live', region:'Africa', country:'South Africa', language:'English', topic:'General', access:'Free', url:'https://www.sowetanlive.co.za' },
  { id:'easteafrican', name:'The East African', region:'Africa', country:'Kenya', language:'English', topic:'Business, Politics', access:'Some free', url:'https://www.theeastafrican.co.ke' },
  { id:'abcnews', name:'ABC News (Australia)', region:'Oceania', country:'Australia', language:'English', topic:'General', access:'Free', url:'https://www.abc.net.au/news' },
  { id:'sbs', name:'SBS News', region:'Oceania', country:'Australia', language:'English / Multilingual', topic:'Multicultural, Global', access:'Free', url:'https://www.sbs.com.au/news' },
  { id:'stuff', name:'Stuff', region:'Oceania', country:'New Zealand', language:'English', topic:'General', access:'Free', url:'https://www.stuff.co.nz' },
  { id:'rnz', name:'RNZ News', region:'Oceania', country:'New Zealand', language:'English', topic:'General', access:'Free', url:'https://www.rnz.co.nz/news' },
  { id:'aljazeera', name:'Al Jazeera', region:'Middle East', country:'Qatar', language:'English / Arabic', topic:'Middle East, International', access:'Free', url:'https://www.aljazeera.com' },
  { id:'thenational', name:'The National', region:'Middle East', country:'UAE', language:'English', topic:'General, Business', access:'Free', url:'https://www.thenationalnews.com' },
  { id:'arabnews', name:'Arab News', region:'Middle East', country:'Saudi Arabia', language:'English', topic:'General', access:'Free', url:'https://www.arabnews.com' },
  { id:'gulfnews', name:'Gulf News', region:'Middle East', country:'UAE', language:'English', topic:'Business, General', access:'Free', url:'https://gulfnews.com' },
  { id:'reuters', name:'Reuters', region:'Global / Specialized', country:'Global', language:'English', topic:'Business, Politics', access:'Free', url:'https://www.reuters.com' },
  { id:'npr', name:'NPR', region:'Global / Specialized', country:'USA', language:'English', topic:'Radio, News, Culture', access:'Free, donation-supported', url:'https://www.npr.org' },
  { id:'ifpri', name:'IFPRI / CGIAR News', region:'Global / Specialized', country:'Global', language:'English', topic:'Agriculture, Development', access:'Free', url:'https://www.ifpri.org/newsroom' }
];

/* Split into two groups */
const GLOBAL_REGIONS = ['North America','Europe','Global / Specialized'];
const globalOutlets   = OUTLETS.filter(o => GLOBAL_REGIONS.includes(o.region));
const regionalOutlets = OUTLETS.filter(o => !GLOBAL_REGIONS.includes(o.region));

function buildTickerRow(elementId, outlets){
  const el = document.getElementById(elementId);
  if(!el) return;

  // clear first
  el.innerHTML = '';

  // we build a single sequence, then duplicate it for gapless scrolling
  const once = document.createElement('span');
  outlets.forEach((o, idx) => {
    const a = document.createElement('a');
    a.href = o.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.className = 'ticker-link';

    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = o.name;

    const meta = document.createElement('span');
    meta.className = 'meta';
    meta.textContent = `${o.region} · ${o.country} · ${o.topic}`;

    a.appendChild(label);
    a.appendChild(meta);
    once.appendChild(a);

    const sep = document.createElement('span');
    sep.className = 'ticker-sep';
    sep.textContent = ' • ';
    once.appendChild(sep);
  });

  // first sequence
  el.appendChild(once);
  // clone sequence for second half (so -50% shift is seamless)
  const clone = once.cloneNode(true);
  el.appendChild(clone);
}

/* Clock */
function updateClock(){
  const el = document.getElementById('vbClock');
  if(!el) return;
  el.textContent = new Date().toLocaleString();
}

/* Init */
buildTickerRow('tickerGlobal', globalOutlets);
buildTickerRow('tickerRegional', regionalOutlets);
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
