<style>
/* --- Reset & Base Styles --- */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Georgia', serif; line-height: 1.5; background: #fdfdf6; color: #111; padding: 20px; }
a { color: #0645ad; text-decoration: none; }
a:hover { text-decoration: underline; }

/* --- Header --- */
header { text-align: center; margin-bottom: 30px; }
header h1 { font-size: 2.5rem; margin-bottom: 10px; }
header p { font-style: italic; color: #555; }

/* --- Filters --- */
.filters { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 30px; }
.filters select, .filters input[type="text"] {
  padding: 8px 12px;
  font-size: 1rem;
  border-radius: 4px;
  border: 1px solid #ccc;
}

/* --- Region Sections --- */
.region-section { margin-bottom: 40px; }
.region-section h2 { font-size: 1.8rem; border-bottom: 2px solid #111; margin-bottom: 15px; padding-bottom: 5px; }

/* --- Digest Layout --- */
.digest { display: flex; flex-wrap: wrap; gap: 20px; justify-content: flex-start; }

.outlet-card {
  flex: 1 1 300px;
  border-bottom: 1px solid #ccc;
  padding-bottom: 10px;
  margin-bottom: 20px;
}

.outlet-card h3 { font-size: 1.2rem; margin-bottom: 5px; }
.outlet-meta { font-size: 0.85rem; color: #555; margin-bottom: 5px; }
.outlet-meta span { margin-right: 10px; }
.outlet-link { font-weight: bold; display: inline-block; margin-top: 5px; }

/* --- Newspaper Columns --- */
@media(min-width: 900px) {
  .digest { column-count: 3; column-gap: 40px; }
  .outlet-card { break-inside: avoid; }
}
</style>
</head>

/*************** HELPER FUNCTIONS ***************/
// Get unique topics
function getUniqueTopics() {
  const topics = new Set();
  OUTLETS.forEach(o => topics.add(o.topic));
  return Array.from(topics).sort();
}

// Group outlets by region
function groupByRegion(outlets) {
  return outlets.reduce((acc, outlet) => {
    if (!acc[outlet.region]) acc[outlet.region] = [];
    acc[outlet.region].push(outlet);
    return acc;
  }, {});
}

/*************** RENDER FUNCTIONS ***************/
function renderFilters() {
  const topicSelect = document.getElementById('topicFilter');
  const topics = getUniqueTopics();
  topics.forEach(topic => {
    const option = document.createElement('option');
    option.value = topic;
    option.textContent = topic;
    topicSelect.appendChild(option);
  });
}

function renderRegions(filterTopic = '', keyword = '') {
  const container = document.getElementById('regionsContainer');
  container.innerHTML = '';
  const grouped = groupByRegion(OUTLETS);

  Object.keys(grouped).sort().forEach(region => {
    const outlets = grouped[region].filter(o => {
      const matchTopic = filterTopic ? o.topic === filterTopic : true;
      const matchKeyword = keyword ? (
        o.name.toLowerCase().includes(keyword) ||
        o.country.toLowerCase().includes(keyword) ||
        o.topic.toLowerCase().includes(keyword)
      ) : true;
      return matchTopic && matchKeyword;
    });

    if (outlets.length === 0) return;

    const section = document.createElement('div');
    section.className = 'region-section';
    section.innerHTML = `<h2>${region}</h2><div class="digest"></div>`;

    const digest = section.querySelector('.digest');
    outlets.forEach(outlet => {
      const card = document.createElement('div');
      card.className = 'outlet-card';
      card.innerHTML = `
        <h3>${outlet.name}</h3>
        <div class="outlet-meta">
          <span>Country: ${outlet.country}</span>
          <span>Language: ${outlet.language}</span>
          <span>Topic: ${outlet.topic}</span>
        </div>
        <a class="outlet-link" href="${outlet.url}" target="_blank">Visit Website</a>
      `;
      digest.appendChild(card);
    });

    container.appendChild(section);
  });
}

/*************** EVENT LISTENERS ***************/
document.getElementById('topicFilter').addEventListener('change', () => {
  const topic = document.getElementById('topicFilter').value;
  const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
  renderRegions(topic, keyword);
});

document.getElementById('searchInput').addEventListener('input', () => {
  const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
  const topic = document.getElementById('topicFilter').value;
  renderRegions(topic, keyword);
});

/*************** INITIAL RENDER ***************/
renderFilters();
renderRegions();
